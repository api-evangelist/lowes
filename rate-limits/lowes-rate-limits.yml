specification: API Commons Rate Limits
specificationVersion: '0.1'
schema: https://raw.githubusercontent.com/api-evangelist/interface-research/main/schema/api-commons.yml#/$defs/RateLimits
provider: Lowe's
providerId: lowes
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Rate Limiting
  - Retail
description: Lowe's does not publish a public rate-limit policy for apis.lowes.com. Limits are
  governed by partner contract on a case-by-case basis. Replace with concrete numbers if a public
  developer program publishes them.
sources:
  - https://www.lowes.com
notes: No public rate-limits documentation was reachable at reconciliation time.
responseCodes:
  throttled: 429
  quotaExceeded: 429
limits:
  - name: Partner-contracted API requests
    scope: contract
    metric: varies
    limit: 'see partner agreement'
policies:
  - name: Partner agreement scope
    description: Steady-state and burst limits are defined in the partner agreement and may differ
      by integration (supplier feed vs. fulfillment vs. marketplace).
  - name: Backoff
    description: On 429, retry with exponential backoff and respect Retry-After when present.
