    name: Lowe's Product API
    description: >-
      The Lowe's Product API provides programmatic access to Lowe's product
      catalog, inventory, and pricing data. Built on Microsoft Azure API
      Management, the Lowe's developer portal allows partners and developers
      to discover APIs, learn how to use them, test them interactively, and
      obtain API keys. The platform supports integration with Lowe's home
      improvement retail operations.
