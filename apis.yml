aid: lowes
name: Lowe's
description: >-
  Lowe's Companies, Inc. is an American retail company specializing in home
  improvement. Lowe's operates a developer portal built on Microsoft Azure
  API Management that provides partners and developers access to product,
  inventory, pricing, and store APIs for integration with Lowe's retail
  operations. Discover APIs, learn how to use them, try them out interactively,
  and sign up to acquire keys.
