specification: FinOps Framework
specificationVersion: '1.0'
schema: https://www.finops.org/framework/
provider: Lowe's
providerId: lowes
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - FinOps
  - FOCUS
  - Retail
description: 'FOCUS-aligned FinOps stub for Lowe''s: APIs are partner-contracted rather than publicly
  priced; FinOps treatment is contract-driven with negotiated meters per integration.'
sources:
  - https://www.lowes.com
notes: No public pricing / billing documentation; values are contract-driven scaffold pointers.
alignedWith:
  framework: FinOps Foundation Framework
  frameworkUrl: https://www.finops.org/framework/
  dataSpec: FOCUS
  dataSpecVersion: '1.3'
  dataSpecUrl: https://focus.finops.org/focus-specification/v1-3/
publisherName: Lowe's Companies, Inc.
serviceCategory: Retail
billingModel:
  pricingCategory: Contract
  billingFrequency: Per-Contract
  billingCurrency: USD
  chargeCategories:
    - Usage
    - Purchase
    - Adjustment
focusColumns:
  ServiceName: Lowe's APIs
  ServiceCategory: Retail
  ProviderName: Lowe's
  PublisherName: Lowe's Companies, Inc.
  InvoiceIssuerName: Lowe's Companies, Inc.
  BillingCurrency: USD
meters:
  - name: api_requests
    unit: request
    aggregation: sum
    dimensions:
      - integration
      - partner
  - name: contracted_volume
    unit: varies
    aggregation: sum
    dimensions:
      - integration
principles:
  - name: Visibility
    description: Track partner-API consumption against contracted volume; reconcile against monthly
      partner statements.
  - name: Allocation
    description: Tag requests by integration program (supplier, marketplace, fulfillment) for partner-side
      chargeback.
  - name: Optimization
    description: Batch supplier feeds and marketplace updates; cache product data on the partner side to
      stay within contracted volumes.
  - name: Accountability
    description: Partner-side owners reconcile contract terms quarterly; escalate variances through the
      Lowe's partner team.
