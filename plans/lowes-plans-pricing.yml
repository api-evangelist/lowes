provider: Lowe's
providerId: lowes
created: '2026-05-04'
modified: '2026-05-05'
reconciled: false
tags:
  - Ecommerce
  - Home Improvement
  - Retail
  - B2B Partner API
description: Lowe's does not publish a public API plans / pricing page. APIs at apis.lowes.com (and
  the LowesLink / Pro Supplier programs) are partner / vendor onboarded under contract; pricing and
  access tiers are not publicly disclosed. Treat this artifact as a partner / contracted-access scaffold
  until Lowe's publishes a public developer program.
sources:
  - https://www.lowes.com
notes: As of reconciliation date, the Lowe's developer landing returned only "Loading..." and no
  public pricing or plans were available. Plan list intentionally minimal until partner-program details are public.
plans:
  - id: lowes-partner
    name: Lowe's Partner Access
    type: enterprise
    description: Contracted / partner access to Lowe's APIs (suppliers, fulfillment, marketplace integrations).
      Pricing and quotas negotiated under partnership agreement.
    entries:
      - label: Partner contract
        name: partner_contract
        type: subscription
        metric: contract
        limit: -1
        timeFrame: year
        geo: US
        unit: 1
        price: contact partner team
        userMultiplied: false
    elements:
      - name: Partner / vendor onboarding required
      - name: Custom contract terms
